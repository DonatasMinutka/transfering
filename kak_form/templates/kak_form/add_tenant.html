{% extends 'generic/object_edit.html' %}
{% block javascript %}
{{ block.super }}
<script>
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.field-group.mb-5').forEach(function(group) {
        const h2 = group.querySelector('h2');
        if (h2 && h2.textContent.trim() === 'Custom Fields') {
            group.querySelectorAll('.row').forEach(function(row) {
                const input = row.querySelector(
                    '[name="cf_Imones_kodas"], [id*="cf_Imones_kodas"],' +
                    '[name="cf_Kliento_ID"], [id*="cf_Kliento_ID"],' +
                    '[name="cf_kliento_kontaktinis_asmuo"], [id*="cf_kliento_kontaktinis_asmuo"],' +
                    '[name="cf_paslaugu_gavejo_id"], [id*="cf_paslaugu_gavejo_id"],' +
                    '[name="cf_tsm_sdm"], [id*="cf_tsm_sdm"]'
                );
                if (!input) {
                    row.style.display = 'none';
                }
            });
        }
    });
});

</script>
{% endblock %}
